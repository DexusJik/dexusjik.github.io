      - heading "Más que solo gramática" [level=2] [ref=e90]
      - paragraph [ref=e91]: Me titulé como Profesor de Inglés, adquiriendo una base técnica sólida, pero rápidamente comprobé que el sistema tradicional escolar rara vez genera hablantes fluidos. 'Inglés Sin Guion' nace de esa ruptura. Tomé el rigor de la academia y eliminé la fricción del aula para ofrecer consultoría directa, práctica y adaptada a la vida real.
